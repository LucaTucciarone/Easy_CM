# =============================================================================
# EasyCM -- pancreas 10k subset local run
# =============================================================================
# Consumes EasyPseudobulk output from the pancreas_10k_subset.rds run.
# Used for validating the pipeline against TEST/easyCM_results (the OG
# reference run) after the EasyPseudobulk extraction + apeglm shrinkage
# refactor.

inputs:
  counts_dir:      "/nfs/lab/tscc/projects/PankBase/CelltypeMarkers/EasyCM/Apr8_26/Inputs/counts/easycm"
  sample_metadata: "/nfs/lab/tscc/projects/PankBase/CelltypeMarkers/EasyCM/Apr8_26/Inputs/metadata/sample_metadata.tsv"
  sample_column:   "samples"
  celltypes: []                          # empty = auto-discover from counts_dir

outputs:
  results_dir: "/nfs/lab/tscc/projects/PankBase/CelltypeMarkers/EasyCM/Apr8_26/results"
  logs_dir:    "/nfs/lab/tscc/projects/PankBase/CelltypeMarkers/EasyCM/Apr8_26/logs"

steps:
  fgsea: true

filtering:
  # Match the OG/TEST filter: only healthy, untreated samples
  sample_filters:
    derived_diabetes_status: "Normal"
    treatments: "no_treatment"
  min_cells_per_sample: 20
  min_gene_counts:      5
  min_gene_proportion:  0.25
  # donor_col: "donor_accession"          # Disabled: ~ subtype + sample design already controls for per-sample effects

deseq2:
  design:        "~ subtype + sample"
  fdr_threshold: 0.05
  lfc_threshold: 0

fgsea:
  fdr_threshold:    0.10
  min_gene_set_size: 10
  max_gene_set_size: 500
  gene_sets_file:   "/nfs/lab/tscc/luca/Methods/EasyCM/resources/gsea_files/reactome_kegg.gmt.txt"
  exclude_gene_lists:
    - "/nfs/lab/tscc/luca/Methods/EasyCM/resources/gsea_files/rpl_genes.csv"
    - "/nfs/lab/tscc/luca/Methods/EasyCM/resources/gsea_files/rps_genes.csv"
    - "/nfs/lab/tscc/luca/Methods/EasyCM/resources/gsea_files/mtr_genes.csv"
  exclude_gene_patterns:
    - "^MT-"
    - "^NA"
  ranking_stat:        "stat"
  n_top_pathways_plot: 20

logging:
  level: "INFO"
