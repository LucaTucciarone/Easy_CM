# =============================================================================
# EasyCM Configuration
# =============================================================================
# Cell-type marker gene discovery via pseudobulk DESeq2 + fGSEA
#
# EasyCM consumes pre-made pseudobulk matrices produced by the
# EasyPseudobulk notebook. Point `counts_dir` at the notebook's
# `{output_dir}/counts/easycm/` directory.
# See docs/CONFIGURATION.md for detailed field descriptions.

# --- Input data ---
inputs:
  # EasyPseudobulk output: counts/easycm/{cell_mtx,allbut_mtx}/{celltype}_persample_RNA_counts.tsv
  counts_dir: "data/counts/easycm"

  # Sample-level metadata (EasyPseudobulk writes metadata/sample_metadata.tsv).
  # `sample_column` must name the column whose values match the count-matrix
  # column headers. Usually "samples" (library/run level) or "donor_accession"
  # (donor level) -- must match the notebook's agg_col setting.
  sample_metadata: "data/sample_metadata.tsv"
  sample_column: "donor_accession"

  # Which cell types to analyze (empty list = all discovered from counts_dir)
  celltypes: []

# --- Output paths ---
outputs:
  results_dir: "results"
  logs_dir: "logs"

# --- Pipeline steps ---
steps:
  fgsea: true                                  # Run pathway enrichment after DESeq2

# --- Sample and gene filtering ---
filtering:
  # Key-value pairs to filter samples before analysis (applied to sample_metadata)
  sample_filters:
    derived_diabetes_status: "Normal"

  min_cells_per_sample: 20                     # Minimum cells of this type per sample
  min_gene_counts: 5                           # Minimum raw counts for gene filtering
  min_gene_proportion: 0.25                    # Gene must pass min_gene_counts in this fraction of samples
  # donor_col: "donor_accession"               # Optional dedup: keep one sample per donor. Usually unnecessary when design includes + sample term.

# --- DESeq2 parameters ---
deseq2:
  # Design formula: subtype = "interest" vs "other", sample = donor/sample ID
  design: "~ subtype + sample"
  fdr_threshold: 0.05
  lfc_threshold: 0                             # Log2 fold-change threshold (0 = disabled)

# --- fGSEA parameters ---
fgsea:
  fdr_threshold: 0.10
  min_gene_set_size: 10
  max_gene_set_size: 500
  gene_sets_file: "resources/gsea_files/reactome_kegg.gmt.txt"
  exclude_gene_lists:
    - "resources/gsea_files/rpl_genes.csv"
    - "resources/gsea_files/rps_genes.csv"
    - "resources/gsea_files/mtr_genes.csv"
  exclude_gene_patterns:
    - "^MT-"
    - "^NA"
  ranking_stat: "stat"                         # stat | lfc_pvalue
  n_top_pathways_plot: 20                      # Number of pathways in bar chart

# --- Logging ---
logging:
  level: "INFO"                                # DEBUG | INFO | WARN | ERROR
